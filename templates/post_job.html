<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Job — ResumeScreen</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root { --blue:#2563eb; --navy:#0f1f3d; }

    body {
      font-family:'DM Sans',sans-serif;
      background:#f0f4f8; min-height:100vh;
    }

    nav {
      background:linear-gradient(135deg,#0f1f3d,#1e3a8a);
      padding:1rem 2rem; position:sticky; top:0; z-index:1000;
      box-shadow:0 2px 16px rgba(0,0,0,.2);
    }
    .nav-container {
      max-width:1200px; margin:0 auto;
      display:flex; justify-content:space-between; align-items:center;
    }
    .nav-logo {
      color:#fff; font-family:'DM Serif Display',serif;
      font-size:1.4rem; text-decoration:none;
      display:flex; align-items:center; gap:.5rem;
    }
    nav ul { display:flex; list-style:none; gap:.5rem; }
    nav ul li a {
      color:rgba(255,255,255,.85); text-decoration:none;
      font-size:.9rem; font-weight:500; padding:.45rem .9rem;
      border-radius:8px; display:flex; align-items:center; gap:.4rem;
      transition:background .2s, color .2s;
    }
    nav ul li a:hover { background:rgba(255,255,255,.12); color:#fff; }
    nav ul li a.logout { color:#fca5a5; }
    nav ul li a.logout:hover { background:rgba(239,68,68,.15); }

    .page {
      max-width:520px; margin:2.5rem auto; padding:0 1.5rem 3rem;
    }

    .card {
      background:#fff; border-radius:16px;
      box-shadow:0 4px 20px rgba(0,0,0,.08);
      padding:2rem 2.2rem;
      animation:fadeUp .4s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    h2 {
      font-family:'DM Serif Display',serif;
      font-size:1.7rem; color:var(--navy); margin-bottom:.3rem;
    }
    .sub { color:#64748b; font-size:.88rem; margin-bottom:1.75rem; }

    .field { margin-bottom:1.1rem; }
    label {
      display:block; font-size:.85rem; font-weight:600;
      color:#374151; margin-bottom:.4rem;
    }

    .input-wrap { position:relative; }
    .input-wrap i {
      position:absolute; left:.85rem; top:50%; transform:translateY(-50%);
      color:#94a3b8; font-size:.85rem;
    }
    input[type="text"], input[type="file"] {
      width:100%; padding:.72rem .9rem .72rem 2.3rem;
      border:1.5px solid #e2e8f0; border-radius:9px;
      font-family:'DM Sans',sans-serif; font-size:.93rem; color:#1e293b;
      outline:none; background:#fff;
      transition:border-color .2s, box-shadow .2s;
    }
    input[type="file"] { padding-left:.9rem; cursor:pointer; }
    input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,.1); }

    .file-hint { font-size:.78rem; color:#94a3b8; margin-top:.3rem; }

    .error {
      background:#fef2f2; border:1px solid #fecaca; color:#dc2626;
      padding:.7rem .9rem; border-radius:8px; font-size:.85rem;
      margin-bottom:1rem; display:flex; align-items:center; gap:.5rem;
    }

    .btn-submit {
      width:100%; padding:.85rem; margin-top:.75rem;
      background:var(--blue); color:#fff; border:none;
      border-radius:10px; font-family:'DM Sans',sans-serif;
      font-size:1rem; font-weight:600; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:.5rem;
      transition:background .2s, transform .2s, box-shadow .2s;
      box-shadow:0 4px 16px rgba(37,99,235,.35);
    }
    .btn-submit:hover { background:#1d4ed8; transform:translateY(-1px); }
  </style>
</head>
<body>
<nav>
  <div class="nav-container">
    <a href="{{ url_for('hr_dash') }}" class="nav-logo"><i class="fas fa-file-alt"></i> ResumeScreen</a>
    <ul>
      <li><a href="{{ url_for('hr_dash') }}"><i class="fas fa-home"></i> Dashboard</a></li>
      <li><a href="{{ url_for('post_job') }}"><i class="fas fa-plus"></i> Post Job</a></li>
      <li><a href="{{ url_for('logout') }}" class="logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
  </div>
</nav>

<div class="page">
  <div class="card">
    <h2>Post a New Job</h2>
    <p class="sub">Fill in the details and upload a PDF job description</p>

    {% if error %}
      <div class="error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
    {% endif %}

    <form action="{{ url_for('post_job') }}" method="POST" enctype="multipart/form-data">
      <div class="field">
        <label>Company Name</label>
        <div class="input-wrap">
          <i class="fas fa-building"></i>
          <input type="text" name="company" placeholder="e.g. Google" required>
        </div>
      </div>
      <div class="field">
        <label>Job Profile / Title</label>
        <div class="input-wrap">
          <i class="fas fa-briefcase"></i>
          <input type="text" name="job_profile" placeholder="e.g. Data Scientist" required>
        </div>
      </div>
      <div class="field">
        <label>Salary</label>
        <div class="input-wrap">
          <i class="fas fa-rupee-sign"></i>
          <input type="text" name="salary" placeholder="e.g. ₹8,00,000 per annum" required>
        </div>
      </div>
      <div class="field">
        <label>Job Description (PDF only)</label>
        <input type="file" name="job_description" accept=".pdf" required>
        <p class="file-hint"><i class="fas fa-info-circle"></i> Upload the full JD as a PDF. Resumes will be scored against it.</p>
      </div>
      <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> Post Job</button>
    </form>
  </div>
</div>
</body>
</html>
