<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — ResumeScreen</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    :root { --blue:#2563eb; }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'DM Sans',sans-serif; min-height:100vh;
      background:linear-gradient(135deg,#0f1f3d,#1e3a8a,#1e40af);
      display:flex; align-items:center; justify-content:center;
      position:relative; overflow:hidden;
    }
    body::before {
      content:''; position:absolute; width:350px; height:350px;
      border-radius:50%; background:rgba(255,255,255,.04);
      bottom:-60px; left:-60px; animation:pulse 7s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

    .card {
      background:rgba(255,255,255,.07); backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,.13); border-radius:24px;
      padding:2.5rem; width:90%; max-width:420px;
      position:relative; z-index:1;
      animation:rise .5s cubic-bezier(.22,.61,.36,1) both;
    }
    @keyframes rise {
      from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)}
    }

    .back-link {
      display:inline-flex; align-items:center; gap:.4rem;
      color:rgba(255,255,255,.55); font-size:.85rem;
      text-decoration:none; margin-bottom:1.5rem; transition:color .2s;
    }
    .back-link:hover { color:#fff; }

    h2 { font-family:'DM Serif Display',serif; font-size:1.9rem; color:#fff; margin-bottom:.4rem; }
    .sub { color:rgba(255,255,255,.5); font-size:.9rem; margin-bottom:1.75rem; }

    .field { margin-bottom:1.1rem; }
    label { display:block; font-size:.85rem; font-weight:600; color:rgba(255,255,255,.7); margin-bottom:.4rem; }

    .input-wrap { position:relative; }
    .input-wrap i { position:absolute; left:.9rem; top:50%; transform:translateY(-50%); color:rgba(255,255,255,.35); font-size:.9rem; }
    input {
      width:100%; padding:.75rem .9rem .75rem 2.4rem;
      background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.15);
      border-radius:10px; font-family:'DM Sans',sans-serif;
      font-size:.95rem; color:#fff; outline:none;
      transition:border-color .25s, background .25s;
    }
    input::placeholder { color:rgba(255,255,255,.35); }
    input:focus { border-color:rgba(99,179,237,.6); background:rgba(255,255,255,.14); }

    .error {
      background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.35);
      color:#fca5a5; padding:.7rem .9rem; border-radius:8px;
      font-size:.85rem; margin-bottom:1rem;
      display:flex; align-items:center; gap:.5rem;
      animation:shake .4s ease;
    }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

    .btn-submit {
      width:100%; padding:.85rem; margin-top:.5rem;
      background:var(--blue); color:#fff; border:none;
      border-radius:10px; font-family:'DM Sans',sans-serif;
      font-size:1rem; font-weight:600; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:.5rem;
      transition:background .2s, transform .2s, box-shadow .2s;
      box-shadow:0 4px 16px rgba(37,99,235,.4);
    }
    .btn-submit:hover { background:#1d4ed8; transform:translateY(-1px); box-shadow:0 6px 20px rgba(37,99,235,.55); }

    .footer-link { text-align:center; margin-top:1.25rem; font-size:.85rem; color:rgba(255,255,255,.45); }
    .footer-link a { color:rgba(255,255,255,.8); text-decoration:none; font-weight:600; }
    .footer-link a:hover { color:#fff; text-decoration:underline; }
  </style>
</head>
<body>
  <div class="card">
    <a href="{{ url_for('index') }}" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <h2>Create Account</h2>
    <p class="sub">Register as an HR user to start posting jobs</p>

    {% if error %}
      <div class="error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}">
      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" name="email" placeholder="you@company.com" required>
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" name="password" placeholder="Choose a strong password" required>
        </div>
      </div>
      <button type="submit" class="btn-submit"><i class="fas fa-user-plus"></i> Create Account</button>
    </form>

    <p class="footer-link">Already have an account? <a href="{{ url_for('hr_login') }}">Login here</a></p>
  </div>
</body>
</html>
